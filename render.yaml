services:
  - type: web
    name: marketpulse-ai-backend
    env: python
    # Set the backend folder as the root directory for this service
    rootDir: backend
    # Install dependencies listed in requirements.txt
    buildCommand: pip install -r requirements.txt
    # Start uvicorn server binding to 0.0.0.0 and the port provided by Render
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
